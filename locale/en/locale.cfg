[mod-setting-name]
max_solar_power_in_space=Max solar power in space

[mod-setting-description]
max_solar_power_in_space=Sets the maximum solar power used to calculate platform lighting. If a planet or location has higher solar power, brightness will still be capped at this value. It is recommended to keep the value slightly below the possible maximum, as calculations are linear and this results in a more enjoyable effect.
