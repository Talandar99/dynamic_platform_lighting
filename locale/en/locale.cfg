[mod-setting-name]
dynamic_platform_max_solar_power_in_space=Max solar power in space
dynamic_platform_deep_darkness=Deep darkness on low solar power

[mod-setting-description]
dynamic_platform_max_solar_power_in_space=Sets the maximum solar power used to calculate platform lighting. If a planet or location has higher solar power, brightness will still be capped at this value. It is recommended to keep the value slightly below the possible maximum, as calculations are linear and this results in a more enjoyable effect.
dynamic_platform_deep_darkness=With this setting enabled if amount of solar power is less than 5% platform will be rly dark. You can disable this if you find it too dark.
